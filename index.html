<script>
  (function(){
    const box = document.createElement("div");
    box.style.cssText =
      "position:fixed;left:12px;right:12px;bottom:12px;max-height:40vh;overflow:auto;" +
      "background:rgba(0,0,0,.85);border:1px solid rgba(184,158,110,.55);" +
      "border-radius:12px;padding:10px;z-index:99999;color:#fff;font:12px/1.4 Inter,Arial";
    box.innerHTML = "<b>Debug Console</b> (erros vão aparecer aqui)…";
    window.addEventListener("load", ()=> document.body.appendChild(box));

    window.addEventListener("error", (e)=>{
      const msg = (e.message || "Erro") + (e.filename ? `\n${e.filename}:${e.lineno}:${e.colno}` : "");
      box.innerHTML = "<b style='color:#ff5d5d'>ERRO:</b><pre style='white-space:pre-wrap;margin:6px 0 0'>"+msg+"</pre>";
    });

    window.addEventListener("unhandledrejection", (e)=>{
      box.innerHTML = "<b style='color:#ff5d5d'>PROMISE REJECTION:</b><pre style='white-space:pre-wrap;margin:6px 0 0'>"+(e.reason?.stack||e.reason||e)+"</pre>";
    });
  })();
</script>
